<div class="section" style="display: block;">
    <div style="text-align: left; margin-bottom: 20px;">
        <button onclick="esciDalQuiz()" class="btn-back-hub" style="margin: 0;">← Esci al Cruscotto</button>
    </div>

    <div style="max-width: 900px; width: 100%; margin: 0 auto;">

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: #f4f7fa; padding: 15px 25px; border-radius: 12px; border: 1px solid #e2e8f0;">
            <div style="text-align: left;">
                <span id="quiz-title" style="font-weight: bold; color: var(--secondary); display: block; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">Caricamento...</span>
                <span id="progress-text" style="font-size: 1.1rem; color: #444; font-weight: bold;">Domanda 0 di 0</span>
            </div>
            <div style="text-align: right;">
                <span style="display: block; font-size: 0.8rem; color: #666; text-transform: uppercase;">Punteggio Corretto</span>
                <span id="score-display" style="font-size: 1.4rem; font-weight: bold; color: var(--primary);">0</span>
            </div>
        </div>

        <div id="quiz-container" style="background: white; padding: 30px 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow-wrap: break-word; word-wrap: break-word; width: 100%; min-height: 350px;">
            
            <div id="result-box" style="display: none; text-align: center; margin-bottom: 10px;">
                <span style="font-size: 4rem;">🏆</span>
                <h2 style="margin-top: 10px; margin-bottom: 10px;">Test Completato!</h2>
                <p style="font-size: 1.2rem; margin-bottom: 0;">Risposte esatte: <strong id="final-score">0</strong> su <span id="total-questions">0</span>.</p>
            </div>

            <div id="question-box">
                <h3 id="question-text" style="font-size: 1.4rem; color: #2d3748; line-height: 1.5; margin-bottom: 30px;">Caricamento...</h3>
                <div id="options-container" style="display: flex; flex-direction: column; gap: 12px;"></div>
            </div>

            <div id="feedback-box" style="display: none; margin-top: 30px; padding: 25px; border-radius: 12px; background-color: #f9f9f9;">
                <div id="feedback-status" style="font-weight: bold; font-size: 1.2rem; margin-bottom: 10px;"></div>
                <div id="feedback-explanation" style="font-size: 1.05rem; color: #444; line-height: 1.6; margin-bottom: 15px;"></div>
                <div id="feedback-ref" style="font-size: 0.9rem; color: #718096; font-style: italic; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 10px;"></div>
            </div>

            <div id="navigation-box" style="margin-top: 30px; display: flex; justify-content: space-between; gap: 15px; flex-wrap: wrap;">
                <button id="btn-prev" class="btn" style="display: none; background-color: #f4f7fa; color: var(--primary); border: 2px solid var(--primary); margin: 0; width: auto; padding: 12px 25px;" onclick="domandaPrecedente()">← Indietro</button>
                <button class="btn" style="margin: 0; width: auto; padding: 12px 25px; margin-left: auto;" onclick="prossimaDomanda()">Continua →</button>
            </div>

            <div id="fine-esame-box" style="display: none; text-align: center; margin-top: 30px; border-top: 1px solid #e2e8f0; padding-top: 25px;">
                <button class="btn" onclick="esciDalQuiz()">Torna al Cruscotto</button>
            </div>

        </div>

        <div style="margin-top: 40px; border-top: 1px solid #eee; padding-top: 30px; display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; align-items: center;">
            <button class="btn" style="margin: 0; width: auto; min-width: 200px; padding: 12px 15px; font-size: 0.95rem; background-color: #f4f7fa; color: var(--primary); border: 2px solid var(--primary);" onclick="tornaAllHub()">🔧 Torna in Officina</button>
            <button onclick="caricaPagina('pagine/newsletter.html')" style="background: none; border: none; color: var(--primary); font-weight: bold; text-decoration: none; cursor: pointer; font-family: inherit; font-size: 1rem;">📩 Iscriviti alla Newsletter</button>        
        </div>
    </div>
</div>

<style>
    /* Aggiunto width: 100% per allineamento e font-weight: bold alla risposta sbagliata per evitare micro-spostamenti del testo */
    .option-btn { padding: 18px; background: #fff; border: 2px solid #e2e8f0; border-radius: 10px; text-align: left; cursor: pointer; transition: 0.2s; width: 100%; }
    .option-btn:hover { border-color: var(--primary); background: #f8fbff; }
    .option-btn.correct { background: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; font-weight: bold; }
    .option-btn.wrong { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; font-weight: bold; }
</style>
